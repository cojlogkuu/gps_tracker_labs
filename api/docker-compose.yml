services:
  postgres:
    image: postgres:16-alpine
    container_name: gps_tracker_db
    environment:
      POSTGRES_USER: gps
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gps_tracker
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
